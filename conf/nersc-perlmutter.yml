x-pegasus:
  apiLang: python
  createdBy: vahi
  createdOn: 05-12-26T22:30:02Z
pegasus: 5.0.4
sites:
- name: compute
  directories:
  - type: sharedScratch
    path: /global/cfs/cdirs/${RESOURCE_PROJECT}/${RESOURCE_USERNAME}/wf-scratch
    sharedFileSystem: false
    fileServers:
    - url: file:///global/cfs/cdirs/${RESOURCE_PROJECT}/${RESOURCE_USERNAME}/wf-scratch
      operation: all
  - type: localStorage
    path: /global/cfs/cdirs/${RESOURCE_PROJECT}/${RESOURCE_USERNAME}/wf-outputs
    sharedFileSystem: false
    fileServers:
    - url: file:///global/cfs/cdirs/${RESOURCE_PROJECT}/${RESOURCE_USERNAME}/wf-outputs
      operation: all
  grids:
  - type: sfapi
    contact: perlmutter
    scheduler: slurm
    jobtype: compute
  profiles:
#    only uncomment if trying to run in shared fs configuration with no containers.
#    env:
#      PEGASUS_HOME: /global/common/software/m4144/software/install/pegasus/default/bin/..
    pegasus:
      style: glite
      queue: debug
      project: ${RESOURCE_PROJECT}
      memory: 1024
      runtime: 1800
      clusters.num: 2
      glite.arguments: -C cpu
  x-tags:
   - name: gpu
     profiles:
       pegasus:
         glite.arguments: -C gpu
         gpus: 1
         queue: regular
   - name: cpu
     profiles:
       pegasus:
         cores: 1
         glite.arguments: -C cpu
